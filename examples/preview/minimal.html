<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slidesmith 最小样例</title>
<style>
/* ===== Slidesmith runtime: structural mechanics (theme-agnostic) ===== */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body.sm { overflow: hidden; background: #202022; font-family: system-ui, -apple-system, "PingFang SC", sans-serif; }

/* top bar */
.sm-topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 50;
  display: flex; align-items: center; gap: 14px; padding: 0 16px;
  background: #1b1b1d; color: #e9e9e9; font-size: 13px;
}
.sm-progress { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #333; }
.sm-progress__bar { height: 100%; width: 0; background: #B5402A; transition: width 0.2s ease; }
.sm-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.92; }
.sm-counter { font-variant-numeric: tabular-nums; opacity: 0.8; }

/* sidebar */
.sm-sidebar {
  position: fixed; top: 46px; left: 0; bottom: 0; width: 248px; z-index: 40;
  background: #161618; color: #c8c8c8; overflow: auto; padding: 12px;
}
.sm-segnav { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.sm-seg {
  text-align: left; background: transparent; border: 0; color: #bcbcbc;
  padding: 7px 9px; border-radius: 6px; cursor: pointer; font: inherit; font-size: 13px;
  border-left: 3px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sm-seg:hover { background: #232325; }
.sm-seg.active { color: #fff; background: #232325; border-left-color: #B5402A; }
.sm-thumbs { display: flex; flex-direction: column; gap: 9px; }
.sm-thumb {
  width: 222px; height: 124px; overflow: hidden; position: relative;
  border: 2px solid #2a2a2c; border-radius: 5px; cursor: pointer; background: #000;
}
.sm-thumb.active { border-color: #B5402A; }
.sm-thumb .slide {
  position: absolute; top: 0; left: 0; display: block !important;
  transform: scale(0.11354); transform-origin: top left; box-shadow: none;
}
.sm-thumb-num {
  position: absolute; bottom: 3px; right: 5px; font-size: 10px; color: #fff;
  background: rgba(0,0,0,0.55); padding: 0 5px; border-radius: 3px; line-height: 15px;
}

/* stage */
.sm-stage {
  position: absolute; top: 46px; left: 248px; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 18px;
}
.slide {
  width: 1920px; height: 1080px; flex: 0 0 auto; display: none;
  transform: scale(var(--sm-scale, 1)); transform-origin: center center;
  box-shadow: 0 16px 60px rgba(0,0,0,0.5); overflow: hidden;
}
.slide.active { display: block; }

/* typography polish: balance headings (no lonely last word), prettify body wrapping.
   Native CSS, degrades silently on older browsers, no-op on single-line text. */
.slide h1, .slide h2, .slide h3, .slide h4, .slide .title, .slide blockquote { text-wrap: balance; }
.slide p, .slide li, .slide .sub { text-wrap: pretty; }

/* floating nav buttons */
.sm-nav { position: fixed; bottom: 18px; right: 18px; display: flex; gap: 8px; z-index: 60; }
.sm-btn {
  background: #2a2a2c; color: #ececec; border: 1px solid #3a3a3c; border-radius: 7px;
  padding: 6px 12px; cursor: pointer; font-size: 16px; line-height: 1;
}
.sm-btn:hover { background: #343437; }

/* present / fullscreen mode hides chrome */
body.sm.present .sm-topbar,
body.sm.present .sm-sidebar { display: none; }
body.sm.present .sm-stage { top: 0; left: 0; padding: 0; }
body.sm.present .slide { box-shadow: none; }

/* ===== declarative animations (opt-in via block.build -> [data-anim*]) =====
   Hidden initial state applies ONLY to the active stage slide (not thumbnail
   clones) and only when animations are enabled (body.anim). The `B` key drops
   body.anim to disable; reduced-motion never adds it. Per-element / per-item
   delays are set inline by the runtime; keyframes live here. */
/* expoOut easing (huashu "anti-cheap" curve): fast start, slow settle */
body.sm.anim .sm-deck > .slide.active [data-anim] { opacity: 0; animation-fill-mode: both; animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="fade"] { animation-name: sm-fade; animation-duration: 0.5s; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="rise"] { animation-name: sm-rise; animation-duration: 0.55s; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="fade-up"] { animation-name: sm-rise; animation-duration: 0.55s; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="pop"] { animation-name: sm-pop; animation-duration: 0.5s; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="in-left"] { animation-name: sm-in-left; animation-duration: 0.55s; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="in-right"] { animation-name: sm-in-right; animation-duration: 0.55s; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="counter-up"] { animation-name: sm-fade; animation-duration: 0.5s; }
/* stagger-list: container shows immediately, its items rise one by one */
body.sm.anim .sm-deck > .slide.active [data-anim="stagger-list"] { opacity: 1; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="stagger-list"] li { opacity: 0; }
body.sm.anim .sm-deck > .slide.active.sm-reveal [data-anim="stagger-list"] li { animation: sm-rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
@keyframes sm-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes sm-rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
@keyframes sm-pop { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: none; } }
@keyframes sm-in-left { from { opacity: 0; transform: translateX(-48px); } to { opacity: 1; transform: none; } }
@keyframes sm-in-right { from { opacity: 0; transform: translateX(48px); } to { opacity: 1; transform: none; } }

/* ===== continuous MOTION effects (block.build.motion -> [data-motion]) =====
   Ambient loops ported from keynote.html (glow=kl-breathe 呼吸灯, neon, stress)
   + huashu (breathe, float, pulse). Run while shown; honor B-toggle + reduced-
   motion. A growing library: add a name in IR MOTION_NAMES + a keyframe here. */
body.sm.anim .sm-deck > .slide [data-motion] { will-change: transform, opacity, filter; }
body.sm.anim .sm-deck > .slide [data-motion="glow"] { animation: sm-m-glow 3.2s ease-in-out infinite; }
body.sm.anim .sm-deck > .slide [data-motion="breathe"] { animation: sm-m-breathe 3.6s ease-in-out infinite; transform-origin: center; }
body.sm.anim .sm-deck > .slide [data-motion="float"] { animation: sm-m-float 3.4s ease-in-out infinite; }
body.sm.anim .sm-deck > .slide [data-motion="pulse"] { animation: sm-m-pulse 2s ease-in-out infinite; }
body.sm.anim .sm-deck > .slide [data-motion="neon"] { animation: sm-m-neon 5.5s linear infinite; }
body.sm.anim .sm-deck > .slide [data-motion="stress"] { animation: sm-m-stress 4.2s ease-in-out infinite; transform-origin: center; }
body.sm.anim .sm-deck > .slide [data-motion="shimmer"] { will-change: background-position; background: linear-gradient(125deg, #ff6eb4 0%, #ffb347 8%, #ffe46e 16%, #7bf0ff 24%, #a855f7 32%, #f4b73e 40%, #ff6eb4 48%, #06b6d4 56%, #a855f7 64%, #ffb347 72%, #7bf0ff 80%, #ff6eb4 90%, #f4b73e 100%); background-size: 600% 600%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; animation: sm-m-shimmer 6s ease-in-out infinite; }
@keyframes sm-m-glow { 0%, 100% { filter: drop-shadow(0 0 1px transparent); } 50% { filter: drop-shadow(0 0 16px var(--accent, #F4B73E)); } }
@keyframes sm-m-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035); } }
@keyframes sm-m-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes sm-m-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
@keyframes sm-m-neon { 0%, 16%, 18%, 55%, 57%, 100% { opacity: 1; } 17%, 56% { opacity: 0.7; } 80%, 82% { opacity: 0.88; } }
@keyframes sm-m-stress { 0%, 38%, 100% { transform: scale(1); } 45% { transform: scale(1.06); } }
@keyframes sm-m-shimmer { 0% { background-position: 0% 30%; } 33% { background-position: 80% 65%; } 66% { background-position: 40% 90%; } 100% { background-position: 0% 30%; } }

@media (prefers-reduced-motion: reduce) {
  body.sm .sm-deck > .slide [data-anim],
  body.sm .sm-deck > .slide [data-anim="stagger-list"] li { opacity: 1 !important; animation: none !important; }
  body.sm .sm-deck > .slide [data-motion] { animation: none !important; }
}

/* ===== print / PDF export: one slide per page at full 1920x1080 ===== */
@media print {
  @page { size: 1920px 1080px; margin: 0; }
  html, body.sm { overflow: visible; height: auto; background: #fff; }
  .sm-topbar, .sm-sidebar, .sm-nav { display: none !important; }
  .sm-stage { position: static; top: 0; left: 0; right: 0; bottom: auto; padding: 0; display: block; overflow: visible; }
  .sm-deck { display: block; }
  .slide {
    display: block !important; position: relative; width: 1920px; height: 1080px;
    transform: none !important; box-shadow: none; overflow: hidden;
    page-break-after: always; break-after: page;
  }
  .slide:last-child { page-break-after: auto; break-after: auto; }
  /* never hide animated blocks in print/export */
  body.sm .slide [data-anim],
  body.sm .slide [data-anim="stagger-list"] li { opacity: 1 !important; animation: none !important; }
}

</style>
<style data-sm-theme="keynote-dark" media="not all">
/* ===== Slidesmith theme: keynote-dark (flagship) =====
   Theatrical dark keynote: near-black bg + massive light text + single amber
   accent. Ported from the user's keynote-target.html (docs/style-reference).
   Shares the same class contract as `editorial`, so any deck re-skins by
   swapping this file — no content changes. Offline: system font fallbacks. */

:root {
  /* color */
  --bg: #0C0D11;
  --surface: #16181E;
  --surface-2: #1C1F27;
  --ink: #F5F6F8;
  --ink-2: #C2C6D0;
  --muted: #8B91A0;
  --ink-4: #5E636F;
  --accent: #F4B73E;
  --accent-2: #D99828;
  --accent-fg: #0C0D11;
  --accent-soft: rgba(244, 183, 62, 0.15);
  --navy: #5BC8DE;
  --gold: #F4B73E;
  --green: #5FD09A;
  --bad: #FF6B5B;
  --link: #5BC8DE;
  --border: rgba(255, 255, 255, 0.12);
  --rule-strong: rgba(255, 255, 255, 0.22);

  /* fonts: display = Space Grotesk if present, else system; CJK-correct fallbacks; zero-download */
  --font-display: "Space Grotesk", "Inter", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", system-ui, sans-serif;
  --font-body: "Inter", "Space Grotesk", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, "Noto Sans Mono CJK SC", monospace;
  --font-serif: "Newsreader", "Noto Serif CJK SC", "Songti SC", "Source Han Serif SC", serif;

  /* type scale (keynote: big + low-density) */
  --fs-display: 168px;
  --fs-h1: 108px;
  --fs-h2: 76px;
  --fs-h3: 52px;
  --fs-body: 32px;
  --fs-small: 26px;
  --fs-caption: 20px;
  --lh-cjk: 1.45;

  --pad-x: 130px;
  --pad-y: 96px;
}

/* ---- slide base ---- */
.slide {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  text-autospace: normal;
  text-spacing-trim: normal;
  -webkit-font-smoothing: antialiased;
}
.slide__inner {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: var(--pad-y) var(--pad-x);
  display: flex;
  flex-direction: column;
  gap: 0.25em;
}

/* ---- typography ---- */
.slide h1, .slide h2, .slide h3 {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.06;
  letter-spacing: -0.02em;
  margin: 0 0 0.3em;
  color: var(--ink);
}
.slide h1 { font-size: var(--fs-h1); }
.slide h2 { font-size: var(--fs-h2); }
.slide h3 { font-size: var(--fs-h3); color: var(--muted); font-weight: 600; letter-spacing: 0; }
.slide p { font-size: var(--fs-body); line-height: 1.55; margin: 0 0 0.5em; color: var(--ink-2); }
.slide strong { color: var(--ink); font-weight: 700; }
.slide em { color: var(--accent); font-style: normal; font-family: inherit; }
.slide a, .slide .c-link { color: var(--link); }

/* bullets: amber dash markers (keynote motif) */
.slide .list { font-size: var(--fs-body); line-height: 1.5; margin: 0; padding-left: 0; list-style: none; color: var(--ink-2); }
.slide .list li { margin: 0.5em 0; padding-left: 1.5em; position: relative; }
.slide .list li::before { content: ""; position: absolute; left: 0; top: 0.62em; width: 22px; height: 3px; background: var(--accent); }

.slide .quote { font-family: var(--font-serif); font-size: var(--fs-h2); line-height: 1.22; margin: 0; border: 0; color: var(--ink); }
.slide .quote p { font-size: inherit; line-height: inherit; margin: 0; }
.slide .quote cite { display: block; font-family: var(--font-mono); font-size: var(--fs-small); color: var(--muted); font-style: normal; letter-spacing: 0.06em; margin-top: 0.7em; text-transform: uppercase; }
.slide .quote cite::before { content: "— "; }

.slide .code { font-family: var(--font-mono); font-size: var(--fs-small); background: var(--night, #05060A); color: var(--green); border: 1px solid var(--border); padding: 0.7em 0.9em; border-radius: 6px; overflow: auto; line-height: 1.5; }
.slide .fig { margin: 0; display: flex; flex-direction: column; height: 100%; }
.slide .fig img { width: 100%; height: 100%; min-height: 0; border: 1px solid var(--border); }
.slide .fig img.fit-cover { object-fit: cover; }
.slide .fig img.fit-contain { object-fit: contain; }
.slide .fig figcaption { font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--ink-4); margin-top: 0.5em; letter-spacing: 0.1em; text-transform: uppercase; }

.slide .table { border-collapse: collapse; font-size: var(--fs-small); width: 100%; color: var(--ink-2); }
.slide .table th, .slide .table td { border: 0; border-bottom: 1px solid var(--border); padding: 0.55em 0.9em; text-align: left; }
.slide .table th { font-family: var(--font-mono); color: var(--accent); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 2px solid var(--accent); }

.slide .group { display: flex; gap: 36px; }
.slide .group-col { flex-direction: column; }
.slide .group-row { flex-direction: row; }
/* cards inside groups: elevated panel + accent top-border (keynote cards motif) */
.slide .group-row > .blk, .slide .group-row > .group { background: var(--surface); border-top: 3px solid var(--accent); padding: 28px 32px; flex: 1; }

/* ---- token utility classes (driven by block.style; always win) ---- */
.c-bg { color: var(--bg) !important; }
.c-surface { color: var(--surface) !important; }
.c-ink { color: var(--ink) !important; }
.c-muted { color: var(--muted) !important; }
.c-accent { color: var(--accent) !important; }
.c-accent-fg { color: var(--accent-fg) !important; }
.c-link { color: var(--link) !important; }
.c-border { color: var(--border) !important; }
.fs-display { font-size: var(--fs-display) !important; line-height: 1.0; font-family: var(--font-display); letter-spacing: -0.03em; }
.fs-h1 { font-size: var(--fs-h1) !important; }
.fs-h2 { font-size: var(--fs-h2) !important; }
.fs-h3 { font-size: var(--fs-h3) !important; }
.fs-body { font-size: var(--fs-body) !important; }
.fs-small { font-size: var(--fs-small) !important; }
.fs-caption { font-size: var(--fs-caption) !important; }
.al-start { text-align: start !important; }
.al-center { text-align: center !important; }
.al-end { text-align: end !important; }
.w-normal { font-weight: 400 !important; }
.w-medium { font-weight: 500 !important; }
.w-bold { font-weight: 700 !important; }

/* ---- layouts ---- */
.slide__inner.layout-cover { justify-content: center; gap: 0.2em; }
.slide__inner.layout-cover .slot-main { display: flex; flex-direction: column; gap: 0.18em; }

.slide__inner.layout-section { justify-content: center; }
.slide__inner.layout-section .slot-main { border-left: 4px solid var(--accent); padding-left: 0.55em; }

.slide__inner.layout-statement { justify-content: center; }
.slide__inner.layout-statement .slot-main { max-width: 24ch; }
.slide__inner.layout-statement h1, .slide__inner.layout-statement h2 { font-size: 132px; line-height: 1.05; }

.slide__inner.layout-bullets { justify-content: center; }

.slide__inner.layout-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; }
.slide__inner.layout-two-col .slot { min-width: 0; }

.slide__inner.layout-data-stat { justify-content: center; align-items: center; text-align: center; }
.slide__inner.layout-data-stat .slot-main { display: flex; flex-direction: column; align-items: center; gap: 0.05em; }
.slide__inner.layout-data-stat .list li::before { display: none; }

.slide__inner.layout-quote { justify-content: center; }

.slide__inner.layout-end { justify-content: center; align-items: center; text-align: center; }

</style>
<style data-sm-theme="editorial" media="all">
/* ===== Slidesmith theme: editorial (magazine / CJK) =====
   Tokens -> CSS custom properties. Content references semantic token NAMES;
   this theme resolves them. Swap this file to re-skin without touching content. */

:root {
  /* color */
  --bg: #F4EFE4;
  --surface: #FBF8F0;
  --ink: #16181A;
  --muted: #6E6A5E;
  --accent: #B5402A;
  --accent-2: #8E2F1D;
  --accent-fg: #FBF8F0;
  --navy: #1B2B4F;
  --gold: #A07A3A;
  --link: #1B2B4F;
  --border: #D9CFBA;

  /* fonts: system stacks => zero-download, offline, CJK-correct (font subsetting comes later) */
  --font-display: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
  --font-body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
  --font-mono: "SFMono-Regular", Menlo, Consolas, "Noto Sans Mono CJK SC", monospace;

  /* type scale */
  --fs-display: 150px;
  --fs-h1: 96px;
  --fs-h2: 64px;
  --fs-h3: 40px;
  --fs-body: 30px;
  --fs-small: 24px;
  --fs-caption: 20px;
  --lh-cjk: 1.5;

  --pad-x: 110px;
  --pad-y: 90px;
}

/* ---- slide base ---- */
.slide {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  text-autospace: normal;       /* CJK <-> Latin/number auto spacing (progressive) */
  text-spacing-trim: normal;
}
.slide__inner {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: var(--pad-y) var(--pad-x);
  display: flex;
  flex-direction: column;
  gap: 0.2em;
}

/* ---- typography ---- */
.slide h1, .slide h2, .slide h3 {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.15;
  margin: 0 0 0.35em;
  color: var(--ink);
}
.slide h1 { font-size: var(--fs-h1); }
.slide h2 { font-size: var(--fs-h2); }
.slide h3 { font-size: var(--fs-h3); color: var(--muted); }
.slide p { font-size: var(--fs-body); line-height: var(--lh-cjk); margin: 0 0 0.5em; }
.slide strong { color: var(--accent); font-weight: 700; }
.slide em { color: var(--accent); font-style: normal; }
.slide a, .slide .c-link { color: var(--link); }

.slide .list { font-size: var(--fs-body); line-height: var(--lh-cjk); margin: 0; padding-left: 1.1em; }
.slide .list li { margin: 0.28em 0; }
.slide .list li::marker { color: var(--accent); }

.slide .quote { font-family: var(--font-display); font-size: var(--fs-h2); line-height: 1.25; margin: 0; border: 0; }
.slide .quote p { font-size: inherit; line-height: inherit; margin: 0; }
.slide .quote cite { display: block; font-family: var(--font-body); font-size: var(--fs-small); color: var(--muted); font-style: normal; margin-top: 0.6em; }
.slide .quote cite::before { content: "— "; }

.slide .code { font-family: var(--font-mono); font-size: var(--fs-small); background: var(--surface); border: 1px solid var(--border); padding: 0.6em 0.8em; border-radius: 8px; overflow: auto; line-height: 1.45; }
.slide .fig { margin: 0; display: flex; flex-direction: column; height: 100%; }
.slide .fig img { width: 100%; height: 100%; min-height: 0; }
.slide .fig img.fit-cover { object-fit: cover; }
.slide .fig img.fit-contain { object-fit: contain; }
.slide .fig figcaption { font-size: var(--fs-caption); color: var(--muted); margin-top: 0.4em; }

.slide .table { border-collapse: collapse; font-size: var(--fs-small); width: 100%; }
.slide .table th, .slide .table td { border: 1px solid var(--border); padding: 0.5em 0.8em; text-align: left; }
.slide .table th { background: var(--surface); font-weight: 700; }

.slide .group { display: flex; gap: 32px; }
.slide .group-col { flex-direction: column; }
.slide .group-row { flex-direction: row; }

/* ---- token utility classes (driven by block.style; always win over component rules) ---- */
.c-bg { color: var(--bg) !important; }
.c-surface { color: var(--surface) !important; }
.c-ink { color: var(--ink) !important; }
.c-muted { color: var(--muted) !important; }
.c-accent { color: var(--accent) !important; }
.c-accent-fg { color: var(--accent-fg) !important; }

    try { if (presenterWin.closed) { presenterWin = null; return; } } catch (e) {}
    postState(); // resending state doubles as a keep-alive / reload recovery
  }

  function onMessage(e) {
    var d = e && e.data; if (!d || typeof d !== 'object') return;
    if (d.source === 'deck') return;               // ignore our own echoes
    if (d.type === MSG + ':hello') { if (e.source) presenterWin = e.source; postState(); }
    else if (d.type === MSG + ':jump' && typeof d.idx === 'number') { go(d.idx); }
  }
})();

</script>
