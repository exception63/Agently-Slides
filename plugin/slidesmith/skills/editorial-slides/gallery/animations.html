<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slidesmith 动画库 · 所见即所得</title>
<style>
:root{ --accent:#c0392b; --paper:#f4f2ec; --ink:#1c1b19; }
*{ box-sizing:border-box; }
body{ margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif; color:var(--ink); background:#e9e6df; }
.wrap{ max-width:1180px; margin:0 auto; padding:28px 26px 80px; }
header.hero{ padding:18px 0 10px; }
.hero h1{ font-size:30px; margin:0 0 6px; font-weight:800; letter-spacing:-.5px; }
.hero p{ margin:0; color:#5b574e; font-size:15px; line-height:1.6; }
.toolbar{ position:sticky; top:0; z-index:30; background:#e9e6df; padding:12px 0; margin:10px 0 6px; border-bottom:1px solid #cfcabd; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.toolbar input{ flex:1; min-width:200px; height:38px; padding:0 14px; border:1px solid #cfcabd; border-radius:9px; font-size:14px; background:#fff; }
.jump{ display:flex; flex-wrap:wrap; gap:6px; }
.jump a{ font-size:12px; text-decoration:none; color:#3a362e; background:#fff; border:1px solid #d7d2c5; padding:5px 10px; border-radius:7px; }
.jump a:hover{ background:var(--accent); color:#fff; border-color:var(--accent); }
section.cat{ margin:30px 0 8px; }
.cat-h{ display:flex; align-items:center; gap:10px; margin:0 0 4px; }
.cat-rule{ width:5px; height:24px; border-radius:3px; }
.cat-h h2{ font-size:19px; margin:0; font-weight:800; }
.cat-h .badge-new{ font-size:11px; font-weight:700; color:#0f6e56; background:#d8f0e7; padding:2px 8px; border-radius:20px; }
.cat-h .badge-star{ font-size:11px; font-weight:700; color:#854f0b; background:#faeeda; padding:2px 8px; border-radius:20px; }
.cat-note{ margin:0 0 14px; color:#6b665c; font-size:13px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(248px, 1fr)); gap:14px; }
.card{ background:#fff; border:1px solid #ddd8cc; border-radius:14px; padding:12px; display:flex; flex-direction:column; }
.card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
.code{ font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace; padding:2px 8px; border-radius:7px; }
.nm{ font-size:13px; color:#3a362e; font-weight:600; }
.stage{ height:118px; border-radius:10px; background:var(--paper); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.demo-chip{ display:inline-block; padding:9px 18px; border-radius:9px; background:#fff; border:1px solid #e0dccf; font-weight:700; font-size:19px; color:#1a1a1a; }
.demo-big{ font-size:40px; font-weight:800; }
.row{ display:flex; gap:6px; margin-top:9px; align-items:center; }
.btn{ font-size:12px; padding:5px 11px; border-radius:8px; border:1px solid #d7d2c5; background:#faf8f3; cursor:pointer; color:#2c2922; }
.btn:hover{ background:var(--accent); color:#fff; border-color:var(--accent); }
.btn:active{ transform:scale(.97); }
.attr{ margin-top:8px; font:600 11px ui-monospace,SFMono-Regular,Menlo,monospace; color:#9a6a3a; word-break:break-all; }
.loop-tag{ font-size:11px; color:#8a857a; }
.fr-list{ display:flex; flex-direction:column; gap:7px; align-items:flex-start; padding:0 16px; width:100%; }
.fr-list .fragment{ background:#fff; border:1px solid #e0dccf; border-radius:7px; padding:6px 12px; font-size:14px; font-weight:600; }
.tr-view{ width:80%; height:88px; position:relative; border-radius:8px; overflow:hidden; background:#fff; border:1px solid #e0dccf; }
.tr-pane{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:22px; }
.mm-stage{ position:relative; width:100%; height:100%; }
.mm-el{ position:absolute; padding:8px 14px; border-radius:9px; background:var(--accent); color:#fff; font-weight:800; transition:all .7s cubic-bezier(.5,0,.2,1); }
.planned{ margin-top:10px; font-size:12px; color:#7a756a; background:#f3f1ea; border:1px dashed #cfcabd; border-radius:8px; padding:8px 11px; }
.planned b{ color:#5b574e; }
.kb{ width:100%; height:100%; background:linear-gradient(120deg,#c0392b,#e8a13a 60%,#2b6cb0); }
.spot-row{ display:flex; gap:10px; }
footer.foot{ margin-top:40px; color:#7a756a; font-size:12px; line-height:1.7; border-top:1px solid #cfcabd; padding-top:16px; }
.hidden{ display:none !important; }
.picker-banner{ background:#1c3d5a; color:#fff; padding:11px 16px; border-radius:11px; margin:0 0 6px; font-size:13.5px; line-height:1.5; }
.pick-btn{ font-size:12.5px; font-weight:700; padding:7px 12px; border-radius:8px; border:1px solid #1d9e75; background:#1d9e75; color:#fff; cursor:pointer; width:100%; margin-top:9px; }
.pick-btn:hover{ background:#0f6e56; } .pick-btn:active{ transform:scale(.98); }

/* ——— 动画库 _fx.css（内联，单一来源）——— */
/* ════════════════════════════════════════════════════════════════════
   _fx.css · Slidesmith 动画库（集众家所长 · 编号见 references/animations.md）
   与风格无关，所有皮肤共用。由 build.py 内联进成品 deck，也被 gallery/animations.html 复用。
   触发模型（同一套类，deck 与 gallery 都用）：
     .smfx-arm  挂在「页/台」上 = 入场元素先藏起来（armed）
     .smfx-go   挂在「页/台」上 = 现在播入场/强调/点睛
     .smfx-exit 挂在「页/台」上 = 播消失动画（离场前）
   入场/强调用 [data-anim] / [data-emph]；持续用 [data-motion]（一直循环）；消失用 [data-anim-out]。
   全部尊重 prefers-reduced-motion（文末统一降级）。
   缓动：expoOut = cubic-bezier(.16,1,.3,1)（快起慢收，反廉价）；弹簧 linear() 预设见文末。
   ════════════════════════════════════════════════════════════════════ */

:root{
  --smfx-dur: .6s;
  --smfx-ease: cubic-bezier(.16,1,.3,1);
  --smfx-ease-inout: cubic-bezier(.4,0,.2,1);
  /* 烘焙好的弹簧曲线（Josh Comeau 范式 · 离线零运行时，含轻微 overshoot）*/
  --smfx-spring: linear(0,.02,.08,.2,.38,.58,.76,.89,.97,1.02,1.04,1.03,1.01,1);
}

/* 透视：翻牌类入场/消失需要父级 perspective */
.smfx-arm, .smfx-go, .smfx-exit{ perspective: 1400px; }

/* ───────────────────────── A · 入场 Entrance ───────────────────────── */
/* armed：先藏（仅入场，emphasis 不藏）*/
.smfx-arm [data-anim]{ opacity:0; }
.smfx-arm [data-anim="in-left"]{ transform:translateX(-60px); }
.smfx-arm [data-anim="in-right"]{ transform:translateX(60px); }
.smfx-arm [data-anim="rise"],
.smfx-arm [data-anim="fade-up"]{ transform:translateY(28px); }
.smfx-arm [data-anim="pop"]{ transform:scale(.9); }
.smfx-arm [data-anim="back-in"]{ transform:translateY(96px) scale(.86); }
.smfx-arm [data-anim="flip-in"]{ transform:rotateY(88deg); }
.smfx-arm [data-anim="tracking-in"]{ letter-spacing:-.42em; filter:blur(6px); }
.smfx-arm [data-anim="focus-in"]{ filter:blur(14px); }
.smfx-arm [data-anim="slide-blur"]{ transform:translateX(-64px); filter:blur(8px); }

/* go：播放入场 */
.smfx-go [data-anim]{ opacity:0; animation-fill-mode:both; animation-duration:var(--smfx-dur); animation-timing-function:var(--smfx-ease); }
.smfx-go [data-anim="fade"]{ animation-name:smfx-fade; animation-duration:.5s; }
.smfx-go [data-anim="rise"], .smfx-go [data-anim="fade-up"]{ animation-name:smfx-rise; }
.smfx-go [data-anim="pop"]{ animation-name:smfx-pop; animation-timing-function:var(--smfx-spring); }
.smfx-go [data-anim="in-left"]{ animation-name:smfx-in-left; }
.smfx-go [data-anim="in-right"]{ animation-name:smfx-in-right; }
.smfx-go [data-anim="back-in"]{ animation-name:smfx-back-in; animation-duration:.7s; }
.smfx-go [data-anim="flip-in"]{ animation-name:smfx-flip-in; animation-duration:.7s; transform-origin:center; }
.smfx-go [data-anim="tracking-in"]{ animation-name:smfx-tracking-in; animation-duration:.8s; }
.smfx-go [data-anim="focus-in"]{ animation-name:smfx-focus-in; animation-duration:.7s; }
.smfx-go [data-anim="slide-blur"]{ animation-name:smfx-slide-blur; animation-duration:.55s; }
/* 逐条浮现：列表项依次 rise */
.smfx-arm [data-anim="stagger-list"]{ opacity:1; }
.smfx-arm [data-anim="stagger-list"]>*{ opacity:0; transform:translateY(20px); }
.smfx-go [data-anim="stagger-list"]{ opacity:1; animation:none; }
.smfx-go [data-anim="stagger-list"]>*{ animation:smfx-rise .5s var(--smfx-ease) both; }
.smfx-go [data-anim="stagger-list"]>*:nth-child(2){animation-delay:.08s}
.smfx-go [data-anim="stagger-list"]>*:nth-child(3){animation-delay:.16s}
.smfx-go [data-anim="stagger-list"]>*:nth-child(4){animation-delay:.24s}
.smfx-go [data-anim="stagger-list"]>*:nth-child(5){animation-delay:.32s}
.smfx-go [data-anim="stagger-list"]>*:nth-child(6){animation-delay:.40s}
.smfx-go [data-anim="stagger-list"]>*:nth-child(n+7){animation-delay:.48s}

@keyframes smfx-fade{ to{opacity:1} }
@keyframes smfx-rise{ from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:none} }
@keyframes smfx-pop{ from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
@keyframes smfx-in-left{ from{opacity:0;transform:translateX(-60px)} to{opacity:1;transform:none} }
@keyframes smfx-in-right{ from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:none} }
@keyframes smfx-back-in{ from{opacity:0;transform:translateY(96px) scale(.86)} to{opacity:1;transform:none} }
@keyframes smfx-flip-in{ from{opacity:0;transform:rotateY(88deg)} to{opacity:1;transform:none} }
@keyframes smfx-tracking-in{ 0%{opacity:0;letter-spacing:-.42em;filter:blur(6px)} 40%{opacity:1} 100%{opacity:1;letter-spacing:normal;filter:none} }
@keyframes smfx-focus-in{ from{opacity:0;filter:blur(14px)} to{opacity:1;filter:none} }
@keyframes smfx-slide-blur{ from{opacity:0;transform:translateX(-64px);filter:blur(8px)} to{opacity:1;transform:none;filter:none} }

/* ───────────────────────── C · 强调 Emphasis（一次性，元素不藏）─────────── */
.smfx-go [data-emph]{ animation-fill-mode:both; animation-duration:.9s; animation-timing-function:ease; }
.smfx-go [data-emph="tada"]{ animation-name:smfx-tada; }
.smfx-go [data-emph="rubber-band"]{ animation-name:smfx-rubber; }
.smfx-go [data-emph="jello"]{ animation-name:smfx-jello; transform-origin:center; }
.smfx-go [data-emph="heartbeat"]{ animation-name:smfx-heartbeat; animation-duration:1.3s; }
.smfx-go [data-emph="headshake"]{ animation-name:smfx-headshake; animation-duration:.8s; }
.smfx-go [data-emph="shake"]{ animation-name:smfx-shake; animation-duration:.7s; }
.smfx-go [data-emph="text-pop"]{ animation-name:smfx-textpop; animation-duration:.6s; animation-timing-function:var(--smfx-ease); }

@keyframes smfx-tada{ 0%{transform:scale(1)} 10%,20%{transform:scale(.9) rotate(-3deg)} 30%,50%,70%,90%{transform:scale(1.1) rotate(3deg)} 40%,60%,80%{transform:scale(1.1) rotate(-3deg)} 100%{transform:scale(1)} }
@keyframes smfx-rubber{ 0%{transform:scale(1)} 30%{transform:scaleX(1.25) scaleY(.75)} 40%{transform:scaleX(.75) scaleY(1.25)} 50%{transform:scaleX(1.15) scaleY(.85)} 65%{transform:scaleX(.95) scaleY(1.05)} 75%{transform:scaleX(1.05) scaleY(.95)} 100%{transform:scale(1)} }
@keyframes smfx-jello{ 0%,11%,100%{transform:none} 22%{transform:skewX(-12deg) skewY(-12deg)} 33%{transform:skewX(6deg) skewY(6deg)} 44%{transform:skewX(-3deg) skewY(-3deg)} 55%{transform:skewX(1.5deg) skewY(1.5deg)} 66%{transform:skewX(-.8deg) skewY(-.8deg)} }
@keyframes smfx-heartbeat{ 0%,40%,80%,100%{transform:scale(1)} 14%{transform:scale(1.22)} 28%{transform:scale(1)} 54%{transform:scale(1.22)} }
@keyframes smfx-headshake{ 0%{transform:translateX(0)} 12.5%{transform:translateX(-7px) rotateY(-9deg)} 37.5%{transform:translateX(6px) rotateY(7deg)} 62.5%{transform:translateX(-4px) rotateY(-5deg)} 87.5%{transform:translateX(2px) rotateY(3deg)} 100%{transform:translateX(0)} }
@keyframes smfx-shake{ 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-9px)} 20%,40%,60%,80%{transform:translateX(9px)} }
@keyframes smfx-textpop{ from{text-shadow:0 0 0 rgba(0,0,0,0);transform:none} to{text-shadow:0 6px 18px rgba(0,0,0,.28);transform:translateY(-4px)} }

/* ───────────────────────── D · 持续动效 Motion（一直循环）───────────────── */
[data-motion="glow"]{ animation:smfx-glow 2.4s ease-in-out infinite; }
[data-motion="breathe"]{ animation:smfx-breathe 2.8s ease-in-out infinite; }
[data-motion="float"]{ animation:smfx-float 3s ease-in-out infinite; }
[data-motion="pulse"]{ animation:smfx-pulse 1.8s ease-in-out infinite; }
[data-motion="neon"]{ animation:smfx-neon 3.2s steps(1,end) infinite; }
[data-motion="stress"]{ animation:smfx-stress 2.6s ease-in-out infinite; }
[data-motion="shimmer"], [data-motion="gradient-shimmer"]{
  background:linear-gradient(100deg, currentColor 30%, #fff 48%, currentColor 66%);
  background-size:220% 100%; -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:var(--accent,currentColor);
  animation:smfx-shimmer 3.2s linear infinite;
}
@keyframes smfx-glow{ 0%,100%{filter:drop-shadow(0 0 1px currentColor)} 50%{filter:drop-shadow(0 0 12px currentColor)} }
@keyframes smfx-breathe{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.045)} }
@keyframes smfx-float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes smfx-pulse{ 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes smfx-neon{ 0%,19%,21%,55%,57%,100%{opacity:1} 20%,56%{opacity:.55} }
@keyframes smfx-stress{ 0%,72%,100%{transform:scale(1)} 84%{transform:scale(1.06)} }
@keyframes smfx-shimmer{ 0%{background-position:140% 0} 100%{background-position:-40% 0} }

/* ───────────────────────── E · 跨页转场 Transition ──────────────────────
   逐页 CSS 兜底（无 View Transitions API 时）：进/出页用类驱动；deck 级默认由
   body[data-transition] 决定，单页可用 .slide[data-transition] 覆盖（_fx.js 读取）。
   有 View Transitions API 时，_fx.js 走原生 ::view-transition，更顺滑。 */
.smfx-enter{ animation-duration:.5s; animation-fill-mode:both; animation-timing-function:var(--smfx-ease-inout); }
.smfx-leave{ animation-duration:.5s; animation-fill-mode:both; animation-timing-function:var(--smfx-ease-inout); position:absolute; inset:0; }
.smfx-tr-fade.smfx-enter{ animation-name:smfx-fade; }
.smfx-tr-fade.smfx-leave{ animation-name:smfx-fadeout; }
.smfx-tr-slide.smfx-enter{ animation-name:smfx-in-right; }
.smfx-tr-slide.smfx-leave{ animation-name:smfx-out-left; }
.smfx-tr-push.smfx-enter{ animation-name:smfx-in-right; }
.smfx-tr-push.smfx-leave{ animation-name:smfx-out-left; }
.smfx-tr-zoom.smfx-enter{ animation-name:smfx-zoom-in; }
.smfx-tr-zoom.smfx-leave{ animation-name:smfx-zoom-out; }
.smfx-tr-flip.smfx-enter{ animation-name:smfx-flip-in; }
.smfx-tr-flip.smfx-leave{ animation-name:smfx-flip-out; }
.smfx-tr-wipe.smfx-enter{ animation-name:smfx-wipe-in; }
.smfx-tr-split.smfx-enter{ animation-name:smfx-split-in; }
@keyframes smfx-zoom-in{ from{opacity:0;transform:scale(.82)} to{opacity:1;transform:none} }
@keyframes smfx-wipe-in{ from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0 0 0)} }
@keyframes smfx-split-in{ from{clip-path:inset(0 50% 0 50%)} to{clip-path:inset(0 0 0 0)} }

/* 原生 View Transitions：默认时长 + 弹性，单页可调 */
::view-transition-group(*){ animation-duration:.5s; animation-timing-function:var(--smfx-ease-inout); }

/* ───────────────────────── F · 神奇移动 Magic Move ───────────────────────
   元素跨页打同 data-morph（_fx.js 落到 view-transition-name）；浏览器自动补间。
   无原生 API 时 _fx.js 走 FLIP。补间属性对齐 reveal auto-animate。 */
[data-morph]{ /* 标记位；view-transition-name 由 _fx.js 运行时设置/清除 */ }

/* ───────────────────────── G · 消失 Exit ──────────────────────────────── */
.smfx-exit [data-anim-out]{ animation-fill-mode:both; animation-duration:.45s; animation-timing-function:var(--smfx-ease-inout); }
.smfx-exit [data-anim-out="fade-out"]{ animation-name:smfx-fadeout; }
.smfx-exit [data-anim-out="sink"]{ animation-name:smfx-sink; }
.smfx-exit [data-anim-out="zoom-out"]{ animation-name:smfx-zoom-out; }
.smfx-exit [data-anim-out="out-left"]{ animation-name:smfx-out-left; }
.smfx-exit [data-anim-out="out-right"]{ animation-name:smfx-out-right; }
.smfx-exit [data-anim-out="flip-out"]{ animation-name:smfx-flip-out; }
.smfx-exit [data-anim-out="puff-out"]{ animation-name:smfx-puff-out; }
.smfx-exit [data-anim-out="back-out"]{ animation-name:smfx-back-out; }
.smfx-exit [data-anim-out="text-blur-out"]{ animation-name:smfx-text-blur-out; }
@keyframes smfx-fadeout{ to{opacity:0} }
@keyframes smfx-sink{ to{opacity:0;transform:translateY(40px)} }
@keyframes smfx-zoom-out{ to{opacity:0;transform:scale(.82)} }
@keyframes smfx-out-left{ to{opacity:0;transform:translateX(-70px)} }
@keyframes smfx-out-right{ to{opacity:0;transform:translateX(70px)} }
@keyframes smfx-flip-out{ from{transform:rotateY(0);opacity:1} to{transform:rotateY(88deg);opacity:0} }
@keyframes smfx-puff-out{ to{opacity:0;transform:scale(1.4);filter:blur(12px)} }
@keyframes smfx-back-out{ to{opacity:0;transform:translateY(96px) scale(.86)} }
@keyframes smfx-text-blur-out{ to{opacity:0;filter:blur(12px)} }

/* ───────────────────────── B · 分步揭示 Fragments ───────────────────────
   元素加 .fragment（可加方向/变体类）；_fx.js 按步进加 .smfx-vis（已点出）/ .smfx-dim（退居）。
   strike/highlight 类例外：默认可见，点出时才变。 */
.fragment{ opacity:0; transition:opacity .4s var(--smfx-ease), transform .4s var(--smfx-ease), color .3s, text-decoration-color .3s; }
.fragment.up{ transform:translateY(22px); }
.fragment.down{ transform:translateY(-22px); }
.fragment.left{ transform:translateX(28px); }
.fragment.right{ transform:translateX(-28px); }
.fragment.grow{ transform:scale(.7); }
.fragment.shrink{ transform:scale(1.3); }
.fragment.smfx-vis{ opacity:1; transform:none; }
.fragment.smfx-dim{ opacity:.32; }                 /* B4 点出后变暗 */
.fragment.current-visible:not(.smfx-vis){ opacity:0; }  /* B3 只此刻显（_fx.js 控制）*/
/* strike / highlight：默认可见，点出（smfx-vis）时才变 */
.fragment.strike{ opacity:1; }
.fragment.strike.smfx-vis{ text-decoration:line-through; text-decoration-color:currentColor; }
.fragment.highlight{ opacity:1; }
.fragment.highlight.smfx-vis{ color:var(--accent,#c0392b); }

/* ───────────────────────── H · 点睛 Accent ──────────────────────────────── */
/* H1/H2/H3 SVG 线条自绘：path 上加 pathLength="1"，免 getTotalLength */
.smfx-draw path, .smfx-draw line, .smfx-draw polyline{ stroke-dasharray:1; stroke-dashoffset:1; }
.smfx-go .smfx-draw path, .smfx-go .smfx-draw line, .smfx-go .smfx-draw polyline{
  animation:smfx-dash 1.2s var(--smfx-ease-inout) forwards;
}
@keyframes smfx-dash{ to{stroke-dashoffset:0} }
/* H5 聚光灯：容器加 .smfx-spot，被聚焦元素加 [data-focus]，其余压暗 */
.smfx-spot > *{ transition:opacity .4s, filter .4s; }
.smfx-spot.smfx-go > :not([data-focus]){ opacity:.22; filter:saturate(.4); }
.smfx-spot.smfx-go > [data-focus]{ opacity:1; transform:scale(1.04); }
/* H6 Ken Burns：图片缓慢平移+放大 */
.smfx-kenburns{ overflow:hidden; }
.smfx-kenburns img, img[data-motion="ken-burns"]{ animation:smfx-kenburns 18s ease-in-out infinite alternate; transform-origin:center; }
@keyframes smfx-kenburns{ from{transform:scale(1) translate(0,0)} to{transform:scale(1.12) translate(-2%,-2%)} }
/* H7 擦幕揭图 */
.smfx-arm .smfx-wipe, .smfx-arm [data-anim="clip-wipe"]{ clip-path:inset(0 100% 0 0); }
.smfx-go .smfx-wipe, .smfx-go [data-anim="clip-wipe"]{ animation:smfx-wipe-in .8s var(--smfx-ease-inout) forwards; }

/* ───────────────────────── I · 背景氛围 Ambient Background ───────────────── */
/* I1 极光/网格渐变：容器加 .smfx-aurora（自带漂移光团）*/
.smfx-aurora{ position:relative; overflow:hidden; isolation:isolate; }

<script>
/* ════════════════════════════════════════════════════════════════════
   _fx.js · Slidesmith 动画引擎（与 _fx.css 配套 · 编号见 references/animations.md）
   暴露 window.SMFX，供 _engine.js 在导航处可选调用（_engine 没装 _fx 时全是 no-op）：
     SMFX.onActive(slide)        翻到某页 → 播入场 [data-anim] + 强调 [data-emph] + 点睛
     SMFX.transition(apply,next) 翻页时包一层（神奇移动 data-morph 走 View Transitions / FLIP）
     SMFX.stepForward(slide)     该页还有未点出的 .fragment → 点出下一条并返回 true（吃掉这次翻页）
     SMFX.stepBack(slide)        该页有已点出的 .fragment → 收回上一条并返回 true
   全部防御式：结构缺失就安静跳过。尊重 prefers-reduced-motion。
   ════════════════════════════════════════════════════════════════════ */
(function () {
  var reduce = false;
  try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
  var hasVT = typeof document.startViewTransition === 'function';

  /* —— 入场/强调：翻到该页时重播 —— */
  function onActive(slide) {
    if (!slide) return;
    // 复位再播（移除 go → 强制 reflow → 加 arm+go）
    slide.classList.remove('smfx-go', 'smfx-exit');
    slide.classList.add('smfx-arm');
    void slide.offsetWidth;                 // reflow，让动画能重播
    requestAnimationFrame(function () {
      slide.classList.add('smfx-go');
    });
    resetFragments(slide);
  }

  /* —— 离场：返回承诺，播完 data-anim-out 再继续（_engine 可不等）—— */
  function playExit(slide, ms) {
    if (!slide || reduce || !slide.querySelector('[data-anim-out]')) return Promise.resolve();
    slide.classList.add('smfx-exit');
    return new Promise(function (res) { setTimeout(res, ms || 460); });
  }

  /* ───────── 分步揭示 fragments ───────── */
  function fragsOf(slide) {
    return Array.prototype.slice.call(slide.querySelectorAll('.fragment'));
  }
  // 返回去重排序后的步序：每个 fragment 的 data-fragment-index（缺省=DOM 顺序），同序号同步出现
  function fragSteps(slide) {
    var frags = fragsOf(slide);
    var order = frags.map(function (f, i) {
      var idx = f.dataset.fragmentIndex;
      return { f: f, key: (idx === undefined || idx === '') ? (1000 + i) : parseInt(idx, 10) };
    });
    var keys = order.map(function (o) { return o.key; }).filter(function (v, i, a) { return a.indexOf(v) === i; });

    var s = fragSteps(slide); slide.__fstep = step;
    s.order.forEach(function (o) {
      var rank = s.keys.indexOf(o.key);          // 该条属于第几步（0 起）
      var f = o.f;
      f.classList.toggle('smfx-vis', rank < step);
      // current-visible：只在“正好这一步”可见
      if (f.classList.contains('current-visible')) {
        f.classList.toggle('smfx-vis', rank === step - 1);
      }
      // semi-out：点出后、再往后走则变暗
      if (f.classList.contains('semi-out')) {
        f.classList.toggle('smfx-dim', rank < step - 1);
      }
    });
  }
  function resetFragments(slide) {
    if (!slide.querySelector('.fragment')) return;
    applyFragState(slide, reduce ? 999 : 0);     // 减少动态时直接全显
  }
  function stepForward(slide) {
    if (!slide || reduce) return false;
    var s = fragSteps(slide); if (!s.keys.length) return false;
    var cur = slide.__fstep || 0;
    if (cur >= s.keys.length) return false;       // 没有更多步 → 放行翻页
    applyFragState(slide, cur + 1); return true;
  }
  function stepBack(slide) {
    if (!slide || reduce) return false;
    var s = fragSteps(slide); if (!s.keys.length) return false;
    var cur = slide.__fstep || 0;
    if (cur <= 0) return false;
    applyFragState(slide, cur - 1); return true;
  }

  /* ───────── 神奇移动 Magic Move（data-morph）───────── */
  function morphMap(slide) {
    var m = {};
    if (!slide) return m;
    slide.querySelectorAll('[data-morph]').forEach(function (el) { m[el.getAttribute('data-morph')] = el; });
    return m;
  }
  // 给两页中“同 data-morph”的元素配上同一个 view-transition-name；返回清理函数
  function tagMorphPairs(oldSlide, newSlide) {
    var a = morphMap(oldSlide), b = morphMap(newSlide), tagged = [];
    Object.keys(a).forEach(function (id) {
      if (b[id]) {

        a[id].style.viewTransitionName = name;
        b[id].style.viewTransitionName = name;
        tagged.push(a[id], b[id]);
      }
    });
    return function clear() { tagged.forEach(function (el) { el.style.viewTransitionName = ''; }); };
  }
  // FLIP 兜底：不支持 View Transitions 时，手动把配对元素从旧位置补间到新位置

    var a = morphMap(oldSlide), b = morphMap(newSlide), firsts = {};
    Object.keys(a).forEach(function (id) { if (b[id]) firsts[id] = a[id].getBoundingClientRect(); });

    Object.keys(firsts).forEach(function (id) {
      var first = firsts[id], el = b[id], last = el.getBoundingClientRect();

      try {
        el.animate(
          [{ transform: 'translate(' + dx + 'px,' + dy + 'px) scale(' + sx + ',' + sy + ')' }, { transform: 'none' }],
          { duration: 560, easing: 'cubic-bezier(.2,.8,.2,1)' });
      } catch (e) {}
    });
  }

  /* —— 翻页包装：有配对的 data-morph 用 VT/FLIP 做神奇移动；否则原生淡变或瞬切 —— */
  function transition(applyFn, newSlide) {
    var oldSlide = document.querySelector('#deck .slide.active');
    var hasMorph = oldSlide && newSlide &&
      Object.keys(morphMap(oldSlide)).some(function (id) { return morphMap(newSlide)[id]; });

    if (reduce) { applyFn(); return; }

    if (hasVT) {
      var clear = hasMorph ? tagMorphPairs(oldSlide, newSlide) : function () {};
      var vt = document.startViewTransition(function () { applyFn(); });
      if (vt && vt.finished && vt.finished.finally) vt.finished.finally(clear);
      else setTimeout(clear, 700);
      return;
    }
    // 无 View Transitions：有 morph 走 FLIP，否则直接切（入场动画补足观感）
    if (hasMorph) { flipPairs(oldSlide, newSlide, applyFn); return; }
    applyFn();
  }

  /* ───────── 点睛初始化（线条自绘已纯 CSS；这里给没写 pathLength 的 path 补救）───────── */
  function initAccents(root) {
    (root || document).querySelectorAll('.smfx-draw path:not([pathLength]), .smfx-draw polyline:not([pathLength])').forEach(function (p) {
      try {
        var len = p.getTotalLength();
        p.style.strokeDasharray = len; p.style.strokeDashoffset = len;
      } catch (e) {}
    });
  }

  window.SMFX = {
    onActive: onActive,
    transition: transition,
    stepForward: stepForward,
    stepBack: stepBack,
    playExit: playExit,
    initAccents: initAccents,
    applyFragState: applyFragState,
    hasViewTransitions: hasVT
  };

  if (document.readyState !== 'loading') initAccents();
  else document.addEventListener('DOMContentLoaded', function () { initAccents(); });
})();

</script>

 ], planned:'E1 瞬切 none · E3 过色淡变 · E10 立方体 cube · E11 百叶窗/棋盘（进阶 CSS 拼块）— 排期中'},

   {code:'J1', name:'极光团', kind:'canvas', attr:'data-fx="gradient-blob"', use:'满屏背景'},
   {code:'J2', name:'星座连线', kind:'canvas', attr:'data-fx="constellation"', use:'满屏背景'},

   {code:'J11', name:'数据流', kind:'canvas', attr:'data-fx="data-stream"', use:'数据/安全'},
   {code:'J12', name:'礼花炮', kind:'canvas', attr:'data-fx="confetti-cannon"', use:'结尾庆祝'},

];

/* ════ 选择模式（picker）：被 Studio 当子窗口打开时，每卡多一个「应用到选中」 ════ */
var PICKER = (location.hash.indexOf('picker') >= 0) || !!window.opener;
function cleanVal(attr){ var m = String(attr).match(/"([^"]+)"/); return m ? m[1] : ''; }
function pickSpec(it){
  var v = cleanVal(it.attr);
  switch(it.kind){
    case 'enter': case 'enter-list': return { mode:'attr', attr:'data-anim', val:v };
    case 'emph': return { mode:'attr', attr:'data-emph', val:v };
    case 'motion': return { mode:'attr', attr:'data-motion', val:v };
    case 'motion-shimmer': return { mode:'attr', attr:'data-motion', val:'shimmer' };
    case 'exit': return { mode:'attr', attr:'data-anim-out', val:v };
    case 'frag': return { mode:'class', add:('fragment'+(it.variant?(' '+it.variant):'')).split(' ').filter(Boolean), scope:'el' };
    case 'tr': return { mode:'attr', attr:'data-transition', val:v, scope:'slide' };
    case 'mm': return { mode:'morph' };
    case 'draw': return { mode:'class', add:['smfx-draw'], scope:'el' };
    case 'spot': return { mode:'class', add:['smfx-spot'], scope:'el' };
    case 'kenburns': return { mode:'class', add:['smfx-kenburns'], scope:'el' };
    case 'wipe': return { mode:'attr', attr:'data-anim', val:'clip-wipe' };
    case 'aurora': return { mode:'class', add:['smfx-aurora'], scope:'slide' };
    case 'grain': return { mode:'class', add:['smfx-grain'], scope:'slide' };
    case 'canvas': return { mode:'attr', attr:'data-fx', val:v, scope:'slide' };
  }
  return { mode:'attr', attr:'data-anim', val:v };
}

/* ════ 渲染 ════ */
var canvasStages = [];   // J 类 canvas 卡的台子，用 IntersectionObserver 只跑可见的（省电）
function el(tag, cls, html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function tint(hex, a){ return hex + a; }

function replay(stage){ stage.classList.remove('smfx-go'); void stage.offsetWidth; stage.classList.add('smfx-arm','smfx-go'); }

function buildCard(it, color){
  var card = el('div','card');
  card.dataset.search = (it.code+' '+it.name+' '+it.attr).toLowerCase();
  var head = el('div','card-head');
  var code = el('span','code', it.code); code.style.background = tint(color,'22'); code.style.color = color;
  head.appendChild(code); head.appendChild(el('span','nm', it.name + (it._new?' <span class="badge-new">新</span>':'')));
  card.appendChild(head);

  var stage = el('div','stage');
  card.appendChild(stage);
  var row = el('div','row');
  card.appendChild(row);

  var k = it.kind;
  if(k==='enter'){
    stage.classList.add('smfx-arm');
    stage.appendChild(el('span','demo-chip', '标题')).setAttribute('data-anim', it.attr.match(/"(.+)"/)[1]);
    var b=el('button','btn','↻ 重播'); b.onclick=function(){ replay(stage); }; row.appendChild(b);
    setTimeout(function(){ stage.classList.add('smfx-go'); }, 120);
  } else if(k==='enter-list'){
    stage.classList.add('smfx-arm');
    var ul=el('ul','demo-chip'); ul.style.cssText='list-style:none;margin:0;padding:6px 14px;text-align:left;font-size:14px;';
    ul.setAttribute('data-anim','stagger-list'); ul.innerHTML='<li>第一条</li><li>第二条</li><li>第三条</li>';
    stage.appendChild(ul);
    var b=el('button','btn','↻ 重播'); b.onclick=function(){ replay(stage); }; row.appendChild(b);
    setTimeout(function(){ stage.classList.add('smfx-go'); }, 120);
  } else if(k==='emph'){
    var chip=el('span','demo-chip','关键词'); chip.setAttribute('data-emph', it.attr.match(/"(.+)"/)[1]); stage.appendChild(chip);
    var b=el('button','btn','↻ 重播'); b.onclick=function(){ stage.classList.remove('smfx-go'); void stage.offsetWidth; stage.classList.add('smfx-go'); }; row.appendChild(b);
    setTimeout(function(){ stage.classList.add('smfx-go'); }, 200);
  } else if(k==='motion'){
    var chip=el('span','demo-chip','关键词'); chip.style.color=color; chip.setAttribute('data-motion', it.attr.match(/"(.+)"/)[1]); stage.appendChild(chip);
    row.appendChild(el('span','loop-tag','● 持续循环'));
  } else if(k==='motion-shimmer'){
    var chip=el('span','demo-chip demo-big','流光'); chip.style.setProperty('--accent', color); chip.setAttribute('data-motion','shimmer'); stage.appendChild(chip);
    row.appendChild(el('span','loop-tag','● 持续循环'));
  } else if(k==='exit'){
    var chip=el('span','demo-chip','标题'); chip.setAttribute('data-anim-out', it.attr.match(/"(.+)"/)[1]); stage.appendChild(chip);
    var b=el('button','btn','↻ 重播'); b.onclick=function(){ stage.classList.remove('smfx-exit'); void stage.offsetWidth; stage.classList.add('smfx-exit'); setTimeout(function(){ stage.classList.remove('smfx-exit'); },900); }; row.appendChild(b);
  } else if(k==='frag'){
    var list=el('div','fr-list');
    ['① 第一点','② 第二点','③ 第三点'].forEach(function(t){ var f=el('div','fragment'+(it.variant?(' '+it.variant):''), t); list.appendChild(f); });
    stage.appendChild(list); stage.__step=0;
    if(window.SMFX) window.SMFX.applyFragState(stage,0);
    var bn=el('button','btn','→ 下一步'); bn.onclick=function(){ stage.__step=(stage.__step||0)+1; if(stage.__step>3) stage.__step=0; window.SMFX.applyFragState(stage, stage.__step); };
    var br=el('button','btn','重置'); br.onclick=function(){ stage.__step=0; window.SMFX.applyFragState(stage,0); };
    row.appendChild(bn); row.appendChild(br);
  } else if(k==='tr'){
    var view=el('div','tr-view');
    var pa=el('div','tr-pane','第 1 页'); pa.style.background='#fff'; pa.style.color='#333';
    var pb=el('div','tr-pane','第 2 页'); pb.style.background=color; pb.style.color='#fff'; pb.style.opacity='0';
    view.appendChild(pa); view.appendChild(pb); stage.appendChild(view); stage.__on=false;
    var b=el('button','btn','⇄ 切换'); b.onclick=function(){
      stage.__on=!stage.__on;
      var enter = stage.__on?pb:pa, leave = stage.__on?pa:pb;
      [pa,pb].forEach(function(p){ p.className='tr-pane'; p.style.opacity='0'; });
      enter.style.opacity='1';
      enter.classList.add('smfx-enter','smfx-tr-'+it.tr); leave.classList.add('smfx-leave','smfx-tr-'+it.tr); leave.style.opacity='1';
      setTimeout(function(){ leave.style.opacity='0'; leave.className='tr-pane'; enter.className='tr-pane'; enter.style.opacity='1'; },520);
    };
    row.appendChild(b);
  } else if(k==='mm'){
    var ms=el('div','mm-stage'); stage.appendChild(ms); stage.__on=false;
    var e2=el('div','mm-el'); ms.appendChild(e2);
    function setState(on){
      if(it.mm==='move'){ e2.textContent='42%'; if(on){ e2.style.left='62%'; e2.style.top='54%'; e2.style.fontSize='34px'; e2.style.transform='translate(-50%,-50%)'; } else { e2.style.left='14px'; e2.style.top='12px'; e2.style.fontSize='18px'; e2.style.transform='none'; } }
      else if(it.mm==='text'){ e2.style.left='50%'; e2.style.top='50%'; e2.style.transform='translate(-50%,-50%)'; e2.style.fontSize='34px'; e2.textContent= on?'89%':'42%'; }
      else if(it.mm==='color'){ e2.style.left='50%'; e2.style.top='50%'; e2.style.transform='translate(-50%,-50%)'; e2.style.fontSize='22px'; e2.textContent='标签'; e2.style.background= on?'#1D9E75':'#D85A30'; }
    }
    setState(false);
    var b=el('button','btn','▶ 播放'); b.onclick=function(){
      stage.__on=!stage.__on;
      if(window.SMFX && window.SMFX.hasViewTransitions){
        e2.style.viewTransitionName='mm-demo-'+it.code;
        var vt=document.startViewTransition(function(){ setState(stage.__on); });
        if(vt&&vt.finished) vt.finished.finally(function(){ e2.style.viewTransitionName=''; });
      } else { setState(stage.__on); }
    };
    row.appendChild(b);
    row.appendChild(el('span','loop-tag', (window.SMFX&&window.SMFX.hasViewTransitions)?'原生 View Transitions':'CSS 补间兜底'));
  } else if(k==='draw'){
    stage.classList.add('smfx-arm');
    var svg='<svg class="smfx-draw" width="180" height="60" viewBox="0 0 180 60">'
      +'<path pathLength="1" d="M10 42 C 50 50, 130 50, 170 40" fill="none" stroke="'+color+'" stroke-width="4" stroke-linecap="round"/></svg>';
    var box=el('div','', '<div style="font-size:22px;font-weight:800;margin-bottom:-6px">关键词</div>'+svg); box.style.textAlign='center';
    stage.appendChild(box);
    var b=el('button','btn','↻ 重播'); b.onclick=function(){ replay(stage); }; row.appendChild(b);
    setTimeout(function(){ stage.classList.add('smfx-go'); },150);
  } else if(k==='spot'){
    var sp=el('div','smfx-spot spot-row');
    sp.innerHTML='<span class="demo-chip">其它</span><span class="demo-chip" data-focus style="background:'+color+';color:#fff;border-color:'+color+'">重点</span><span class="demo-chip">其它</span>';
    stage.appendChild(sp);
    var b=el('button','btn','◉ 聚焦'); b.onclick=function(){ sp.classList.toggle('smfx-go'); }; row.appendChild(b);
  } else if(k==='kenburns'){
    var kb=el('div','smfx-kenburns'); kb.style.cssText='width:100%;height:100%'; kb.innerHTML='<div class="kb" style="width:100%;height:100%"></div>';
    kb.querySelector('.kb').setAttribute('data-motion','ken-burns');
    stage.appendChild(kb); row.appendChild(el('span','loop-tag','● 持续缓移'));
  } else if(k==='wipe'){
    stage.classList.add('smfx-arm');
    var w=el('div','smfx-wipe'); w.style.cssText='width:78%;height:70px;border-radius:9px;background:'+color+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px'; w.textContent='揭晓';
    stage.appendChild(w);
    var b=el('button','btn','↻ 重播'); b.onclick=function(){ replay(stage); }; row.appendChild(b);
    setTimeout(function(){ stage.classList.add('smfx-go'); },150);
  } else if(k==='aurora'){
    stage.classList.add('smfx-aurora'); stage.style.background='#14121c';
    stage.appendChild(el('span','demo-chip','极光底')).style.cssText='background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.2)';
    row.appendChild(el('span','loop-tag','● 持续漂移'));
  } else if(k==='grain'){
    stage.classList.add('smfx-grain'); stage.style.background='#2a2722';
    stage.appendChild(el('span','demo-chip','颗粒质感')).style.cssText='background:transparent;color:#f0ece2;border-color:rgba(255,255,255,.2)';
    row.appendChild(el('span','loop-tag','静态覆层'));
  } else if(k==='canvas'){
    var fxName = it.attr.match(/"(.+)"/)[1];
    stage.style.cssText += ';height:150px;background:#0b0d16;';
    stage.style.setProperty('--accent','#7c5cff'); stage.style.setProperty('--accent-2','#22d3ee'); stage.style.setProperty('--ink','#e9e9f3');
    stage.__fxName = fxName;
    stage.__initFx = function(){ if(stage.__fx&&stage.__fx.stop){ try{stage.__fx.stop();}catch(e){} } if(window.HPX&&window.HPX[fxName]) stage.__fx = window.HPX[fxName](stage); };
    stage.__stopFx = function(){ if(stage.__fx&&stage.__fx.stop){ try{stage.__fx.stop();}catch(e){} stage.__fx=null; } };
    canvasStages.push(stage);
    var b=el('button','btn','↻ 重播'); b.onclick=function(){ stage.__initFx(); }; row.appendChild(b);
    if(it.use) row.appendChild(el('span','loop-tag','● '+it.use));
  }

  card.appendChild(el('div','attr', it.attr));
  if(PICKER){
    var pk = el('button','pick-btn','＋ 应用到选中');
    pk.onclick = function(){
      try{ (window.opener||window.parent).postMessage({ type:'smfx-pick', code:it.code, name:it.name, spec:pickSpec(it) }, '*'); }catch(e){}
      pk.textContent = '✓ 已应用'; setTimeout(function(){ pk.textContent = '＋ 应用到选中'; }, 900);
    };
    card.appendChild(pk);
  }
  return card;
}

if(PICKER){
  var bn = el('div','picker-banner','🎬 选择模式：在 Studio 里先<b>选中一个元素</b>，再点任意效果的「＋ 应用到选中」即可套用 —— 这个窗口可一直开着当调色板。');
  document.querySelector('.toolbar').insertAdjacentElement('beforebegin', bn);
}
var catsEl = document.getElementById('cats'), jumpEl = document.getElementById('jump');
REG.forEach(function(cat){
  var sec = el('section','cat'); sec.id='cat-'+cat.key;
  var h = el('div','cat-h');
  var rule=el('span','cat-rule'); rule.style.background=cat.color; h.appendChild(rule);
  var badge = cat._star?' <span class="badge-star">★ 旗舰</span>':(cat._new?' <span class="badge-new">新</span>':'');
  h.appendChild(el('h2', null, cat.key+' · '+cat.title + badge));
  sec.appendChild(h);
  sec.appendChild(el('p','cat-note', cat.note));
  var grid=el('div','grid');
  cat.items.forEach(function(it){ grid.appendChild(buildCard(it, cat.color)); });
  sec.appendChild(grid);
  if(cat.planned) sec.appendChild(el('div','planned','<b>更多（规划中）：</b>'+cat.planned));
  catsEl.appendChild(sec);
  var a=el('a',null,cat.key); a.href='#cat-'+cat.key; a.title=cat.title; jumpEl.appendChild(a);
});

/* J 类 canvas：只跑滚到可见的（IntersectionObserver），离开视口就停，省电 */
if(canvasStages.length){
  try{
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        var s = en.target;
        if(en.isIntersecting){ if(!s.__fx) s.__initFx(); }
        else { s.__stopFx && s.__stopFx(); }
      });
    }, { rootMargin:'120px' });
    canvasStages.forEach(function(s){ io.observe(s); });
  }catch(e){ canvasStages.forEach(function(s){ s.__initFx(); }); }
}

/* 搜索过滤 */
document.getElementById('q').addEventListener('input', function(e){
  var q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(function(c){ c.classList.toggle('hidden', q && c.dataset.search.indexOf(q)<0); });
  document.querySelectorAll('section.cat').forEach(function(s){
    var any=Array.prototype.some.call(s.querySelectorAll('.card'), function(c){ return !c.classList.contains('hidden'); });
    s.classList.toggle('hidden', q && !any);
  });
});
</script>
